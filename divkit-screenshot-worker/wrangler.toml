name = "divkit-screenshot"
main = "src/index.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[[r2_buckets]]
binding = "SCREENSHOT_CACHE"
bucket_name = "divkit-screenshots"

[[r2_buckets]]
binding = "REQUEST_LOG"
bucket_name = "divkit-request-log"

[vars]
DEFAULT_WIDTH = "375"
DEFAULT_SCALE = "2"
CACHE_TTL_SECONDS = "3600"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
