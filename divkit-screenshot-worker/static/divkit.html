<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>{{DIVKIT_CSS}}</style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: {{WIDTH}}px; overflow: hidden; {{BACKGROUND}} }
    #root { width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>{{DIVKIT_JS}}</script>
  <script>
    try {
      const json = {{DIVKIT_JSON}};
      window.Ya.DivKit.render({
        id: 'root',
        target: document.getElementById('root'),
        json: json,
        onError(details) { console.error('DivKit error:', details.error); }
      });
    } catch (e) {
      console.error('Render failed:', e);
    } finally {
      document.body.dataset.rendered = 'true';
    }
  </script>
</body>
</html>
